<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <polygon points="100,20 160,60 160,140 100,180 40,140 40,60" fill="url(#gemGradient)" stroke="#4f46e5" stroke-width="2" />
    <polygon points="100,20 160,60 100,60 40,60" fill="url(#gemGradient)" opacity="0.9" />
    <polygon points="160,60 160,140 100,100" fill="url(#gemGradient)" opacity="0.8" />
    <polygon points="100,180 160,140 100,100 40,140" fill="url(#gemGradient)" opacity="0.8" />
    <polygon points="40,60 100,100 40,140" fill="url(#gemGradient)" opacity="0.8" />
    <polygon points="100,40 130,70 100,95 70,70" fill="white" opacity="0.3" />
  </g>
  <g filter="url(#glow)">
    <circle cx="100" cy="100" r="4" fill="#fff" opacity="0.9" />
    <circle cx="82" cy="88" r="3" fill="#e0e7ff" opacity="0.8" />
    <circle cx="118" cy="88" r="3" fill="#e0e7ff" opacity="0.8" />
    <circle cx="100" cy="112" r="3" fill="#e0e7ff" opacity="0.8" />
    <circle cx="70" cy="100" r="2" fill="#c7d2fe" opacity="0.7" />
    <circle cx="130" cy="100" r="2" fill="#c7d2fe" opacity="0.7" />
  </g>
</svg>
