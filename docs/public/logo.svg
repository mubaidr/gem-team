<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="gemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>

  <!-- Main gem body -->
  <polygon points="50,5 85,25 85,55 50,85 15,55 15,25" fill="url(#gemGradient)" stroke="#047857" stroke-width="2"/>

  <!-- Top facet -->
  <polygon points="50,5 85,25 50,35 15,25" fill="#34d399" opacity="0.9"/>

  <!-- Left facet -->
  <polygon points="15,25 50,35 50,85 15,55" fill="#059669" opacity="0.8"/>

  <!-- Right facet -->
  <polygon points="85,25 50,35 50,85 85,55" fill="#047857" opacity="0.9"/>

  <!-- Center highlight line -->
  <line x1="50" y1="35" x2="50" y2="85" stroke="url(#highlight)" stroke-width="2" opacity="0.6"/>

  <!-- Sparkle effect -->
  <circle cx="30" cy="15" r="3" fill="#a7f3d0" opacity="0.8"/>
  <circle cx="75" cy="20" r="2" fill="#a7f3d0" opacity="0.6"/>

  <!-- Text: GEM -->
  <text x="50" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="white">GEM</text>
</svg>
