name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Uses the manifest file to determine versions
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

      # Generate a workflow summary showing what was released
      - name: Generate Release Summary
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          echo "## 🤖 gem-team Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Type" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ steps.release.outputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed Components" >> $GITHUB_STEP_SUMMARY
          ls -1 *.agent.md 2>/dev/null | while read file; do
            echo "- $file" >> $GITHUB_STEP_SUMMARY
          done
